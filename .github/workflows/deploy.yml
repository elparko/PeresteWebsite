# Builds the Astro site and publishes it to GitHub Pages on every push to
# the default branch. Mirrors the old .gitlab-ci.yml job.
#
# One-time setup in the GitHub repo UI:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   Settings → Pages → Custom domain: pereste.com  (kept in public/CNAME too)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # withastro/action runs `npm ci` + `npm run build` and uploads
        # dist/ as the Pages artifact. Node + npm caching are handled.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
